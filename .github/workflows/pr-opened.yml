name: "Pull Request Labeler and Actions"

on:
  pull_request_target:
    types: opened

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5

  pr-opened-actions:
    needs: labeler
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add a comment to the PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Thanks for opening a pull request! Your changes will be reviewed by a repository maintainer soon."
            })

      - name: Assign PR opener and nayasinghania
        uses: actions/github-script@v7
        with:
          script: |
            const opener = context.payload.pull_request.user.login;
            const assignees = Array.from(new Set([opener, 'nayasinghania']));
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees
            });
