name: Label PR, Assign, and Comment On Open

on:
  pull_request:
    types: [opened]

jobs:
  label-assign-comment:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Add "needs review" label
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr_number,
              labels: ["needs review"]
            });

      - name: Assign PR author and @nayasinghania
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const author = context.payload.pull_request.user.login;
            const assignees = Array.from(new Set([author, "nayasinghania"]));
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pr_number,
              assignees: assignees
            });

      - name: Comment about review
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const comment = `Thank you for opening this pull request! Your changes will be reviewed by a repository maintainer soon`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: comment
            });
