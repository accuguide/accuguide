name: Prettier

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - beta

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Check code formatting
        run: npm run check
