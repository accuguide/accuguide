name: ESLint

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - beta

jobs:
  Lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Lint code
        run: npm run lint
