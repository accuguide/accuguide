name: ESLint

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - beta

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: lint
        run: npm run lint
