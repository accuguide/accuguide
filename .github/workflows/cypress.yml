name: Cypress

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - beta

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cypress run
        uses: cypress-io/github-action@be1bab96b388bbd9ce3887e397d373c8557e15af #v6.9.2
        with:
          start: npm run dev
  component:
    name: Component Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cypress run
        uses: cypress-io/github-action@be1bab96b388bbd9ce3887e397d373c8557e15af #v6.9.2
        with:
          start: npm run dev
          component: true
