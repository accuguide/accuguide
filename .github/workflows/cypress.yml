name: E2E Tests

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - beta

jobs:
  Test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Start dev server
        run: npm run dev
      - name: Cypress run
        run: npm run test
